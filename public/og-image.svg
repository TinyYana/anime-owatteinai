<svg width="1200" height="630" viewBox="0 0 1200 630" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <radialGradient id="g1" cx="18%" cy="0%" r="60%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#e8699a" stop-opacity="0.18"/>
      <stop offset="100%" stop-color="#0d0b14" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="g2" cx="90%" cy="10%" r="55%" gradientUnits="userSpaceOnUse">
      <stop offset="0%" stop-color="#70cbb8" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#0d0b14" stop-opacity="0"/>
    </radialGradient>
    <linearGradient id="rail" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#70cbb8"/>
      <stop offset="100%" stop-color="#e8699a"/>
    </linearGradient>
    <!-- higanbana bloom: six-petal conic approximated with rotated ellipses -->
    <g id="bloom">
      <ellipse cx="0" cy="-36" rx="8" ry="22" fill="#e8699a" opacity="0.55"/>
      <ellipse cx="0" cy="-36" rx="8" ry="22" fill="#e8699a" opacity="0.55" transform="rotate(60)"/>
      <ellipse cx="0" cy="-36" rx="8" ry="22" fill="#e8699a" opacity="0.55" transform="rotate(120)"/>
      <ellipse cx="0" cy="-36" rx="8" ry="22" fill="#e8699a" opacity="0.55" transform="rotate(180)"/>
      <ellipse cx="0" cy="-36" rx="8" ry="22" fill="#e8699a" opacity="0.55" transform="rotate(240)"/>
      <ellipse cx="0" cy="-36" rx="8" ry="22" fill="#e8699a" opacity="0.55" transform="rotate(300)"/>
      <circle cx="0" cy="0" r="10" fill="#0d0b14"/>
    </g>
  </defs>

  <!-- Background -->
  <rect width="1200" height="630" fill="#0d0b14"/>
  <rect width="1200" height="630" fill="url(#g1)"/>
  <rect width="1200" height="630" fill="url(#g2)"/>

  <!-- Higanbana motif — top right, faint -->
  <g transform="translate(1080, 120) scale(2.2)" opacity="0.18">
    <use href="#bloom"/>
  </g>
  <!-- Secondary bloom — bottom left -->
  <g transform="translate(140, 520) scale(1.4)" opacity="0.10">
    <use href="#bloom"/>
  </g>

  <!-- Community label -->
  <text x="96" y="208" font-family="'Noto Sans TC', 'Hiragino Sans', system-ui, sans-serif"
        font-size="26" font-weight="500" letter-spacing="6" fill="#9586b0">
    彼岸花社群 · 申請制
  </text>

  <!-- Main title -->
  <text x="92" y="316" font-family="'Noto Sans TC', 'Hiragino Sans', system-ui, sans-serif"
        font-size="96" font-weight="700" fill="#ede8f4">
    追番<tspan fill="#e8699a">進行式</tspan>
  </text>

  <!-- Mono subtitle -->
  <text x="96" y="378" font-family="'JetBrains Mono', 'Cascadia Code', ui-monospace, monospace"
        font-size="26" letter-spacing="10" fill="#6b5c88">
    AnimeOwatteiNai
  </text>

  <!-- Progress rail -->
  <rect x="96" y="430" width="520" height="6" rx="3" fill="#2c2540"/>
  <rect x="96" y="430" width="323" height="6" rx="3" fill="url(#rail)"/>

  <!-- Rail labels -->
  <text x="96" y="460" font-family="'JetBrains Mono', ui-monospace, monospace"
        font-size="18" fill="#9586b0">接著看</text>
  <text x="575" y="460" font-family="'JetBrains Mono', ui-monospace, monospace"
        font-size="18" fill="#9586b0" text-anchor="end">EP 07 / 12</text>

  <!-- Tagline -->
  <text x="96" y="536" font-family="'Noto Sans TC', 'Hiragino Sans', system-ui, sans-serif"
        font-size="28" fill="#7a6a96">
    追番永遠追不完，所以讓系統記得你看到哪
  </text>
</svg>
